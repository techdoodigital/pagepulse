# ---------------------------------------------------------------
# Nginx configuration for Citely (doodigital.co)
# ---------------------------------------------------------------
# This config serves the Next.js app via reverse proxy.
# SSL certificates are managed by Let's Encrypt (certbot).
# Place this file at /etc/nginx/sites-available/doodigital.co
# and symlink to /etc/nginx/sites-enabled/
# ---------------------------------------------------------------

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name doodigital.co www.doodigital.co;

    # Let's Encrypt challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name doodigital.co www.doodigital.co;

    # ----------------------------------------------------------
    # SSL configuration - managed by certbot
    # Run: sudo certbot --nginx -d doodigital.co -d www.doodigital.co
    # Certbot will insert the certificate paths below automatically.
    # ----------------------------------------------------------
    # ssl_certificate /etc/letsencrypt/live/doodigital.co/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/doodigital.co/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ----------------------------------------------------------
    # Gzip compression
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ----------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------
    # Static files from Next.js build output
    # Served directly by Nginx with long cache headers
    # ----------------------------------------------------------
    location /_next/static/ {
        alias /var/www/citely/.next/static/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ----------------------------------------------------------
    # Public static assets (favicon, images, etc.)
    # ----------------------------------------------------------
    location /public/ {
        alias /var/www/citely/public/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ----------------------------------------------------------
    # Reverse proxy to Next.js application
    # ----------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (useful for Next.js HMR in dev, good practice in prod)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # ----------------------------------------------------------
    # Deny access to hidden files (except .well-known)
    # ----------------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
    }
}
